<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- font/typsnitt -->
    <link href="https://fonts.googleapis.com/css2?family=Limelight&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
    <!-- flikikon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='1em' font-size='80'>🐸</text></svg>">
    <!-- karta css -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Make sure you put this AFTER Leaflet's CSS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="houseScript.js"></script>
    <title>Uppgift 4</title>
</head>

<body data-currentPage="wU4">
    <header>
        <h1>Uthyrning av spökhus - Spökhusbyrån AB</h1>
    </header>

    <main>
        <div id="backToStart">
            <p><a href="index.html">Tillbaka till startsidan</a></p>
        </div>

        <div id="errorMessage"></div>

        <div id="houseInfoDiv"></div>

        <div id="booking-div">
            <h2>Boka vistelse</h2>
            <form id="booking-form">
                <fieldset>
                    <label for="start-date">Startdatum:</label>
                    <input type="date" min="2026-03-29" id="start-date" required>
                    <!-- incheckningsdatum (datum, obligatoriskt, inte tidigare än dagens datum) -->
                    <label for="number-nights">Antal nätter:</label>
                    <input type="number" min="1" id="number-nights" required>
                    <!-- antal dagar (nummer, obligatoriskt, min 1) -->
                </fieldset>

                <fieldset>
                    <p id="add-ons">Tillägg:</p>
                    <!-- Minst tre olika, frivilliga tillägg (checkboxar) som påverkar priset, t.ex. “Frukost”, “Spökvandring” och “Nattlig seans” -->
                    <span>
                        <input type="checkbox" id="dinner" name="food" value="dinner">
                        <label for="dinner">Middag (139 kr/natt)</label>
                    </span>
                    <span>
                        <input type="checkbox" id="breakfast" name="food" value="breakfast">
                        <label for="breakfast">Frukost (99 kr/natt)</label>
                    </span>
                    <span>
                        <input type="checkbox" id="ghost-walk" name="activity" value="ghost-walk"> <label for="ghost-walk">Guidad spövandring (199 kr)</label>
                    </span>
                    <span>
                        <input type="checkbox" id="call-ghosts" name="activity" value="call-ghosts"> <label for="call-ghosts">Kalla på spöken (249 kr)</label>
                    </span>
                </fieldset>

                <fieldset>
                    <label for="code">Kampanjkod:</label>
                    <input type="text" id="code" name="code">
                    <!-- kampanjkod (text, valfritt). Hitta själv på en kampanjkod (ex. “GHOST20”) som ger 20% rabatt på totalpriset när den anges korrekt. -->
                </fieldset>

                <fieldset>
                    <p id="price"><span id="final-price">0</span> kr</p>
                    <button id="submit-booking">Boka</button>
                </fieldset>
            </form>
        </div>
    </main>

    <footer>
        <p>Spökhusbyrån AB</p>
    </footer>
</body>

</html>
